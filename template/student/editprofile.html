{% extends 'student/page1.html' %}
{% load static %}

{% block content %}
<div class="container my-5" style="max-width: 600px;">
  <div class="card shadow-lg border-0 p-4">
    <h3 class="text-center text-primary mb-4">Edit Profile</h3>

    <form method="POST">
      {% csrf_token %}
      
      <div class="mb-3">
        <label class="form-label fw-semibold">Full Name</label>
        <input type="text" name="name" value="{{ m.name }}" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Age</label>
        <input type="number" name="age" value="{{ m.age }}" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input type="text" name="username" value="{{ m.username }}" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Address</label>
        <input type="text" name="address" value="{{ m.address }}" class="form-control" required>
      </div>

      <div class="d-grid mt-4">
        <button type="submit" class="btn btn-primary">Update</button>
      </div>
    </form>

    <div class="text-center mt-3">
      <a href="{% url 'viewprofile' %}" class="text-decoration-none text-secondary">← Back to Profile</a>
    </div>
  </div>
</div>
{% endblock %}
