{% extends 'common/page2.html' %}
{% load static %}

{% block content %}
<div class="container mt-5 d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card shadow-lg p-4" style="width: 400px; border-radius: 12px;">
    <h4 class="text-center mb-4 text-primary">Verify Your Details</h4>

    <form method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <input type="text" name="name" class="form-control" placeholder="Enter your name" required>
      </div>
      <div class="mb-3">
        <input type="number" name="age" class="form-control" placeholder="Enter your age" required>
      </div>
      <div class="mb-3">
        <input type="text" name="address" class="form-control" placeholder="Enter your address" required>
      </div>
      <div class="d-grid">
        <button type="submit" class="btn btn-primary">Verify</button>
      </div>
    </form>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-info mt-3 p-2 text-center">{{ message }}</div>
      {% endfor %}
    {% endif %}
  </div>
</div>
{% endblock %}
