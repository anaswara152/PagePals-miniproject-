{% extends 'common/page2.html' %}
{% load static %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card shadow-lg p-4" style="width: 400px; border-radius: 12px;">
    <h4 class="text-center mb-4 text-primary">Set New Password</h4>

    <form method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <input type="password" name="new_password" class="form-control" placeholder="Enter new password" required>
      </div>
      <div class="mb-3">
        <input type="password" name="confirm_password" class="form-control" placeholder="Confirm new password" required>
      </div>
      <div class="d-grid">
        <button type="submit" class="btn btn-success">Update Password</button>
      </div>
    </form>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-danger mt-3 p-2 text-center">{{ message }}</div>
      {% endfor %}
    {% endif %}
  </div>
</div>
{% endblock %}
