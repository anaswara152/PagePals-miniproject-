{% extends 'common/page2.html' %}
{% block title %}Change Password{% endblock title %}

{% block content %}
<div class="container my-5">
    <div class="col-md-6 offset-md-3">
        <div class="card shadow-lg border-0 rounded-3 p-4">
            <h2 class="text-center mb-4 text-primary">Change Password</h2>
            
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Old Password</label>
                    <input type="password" name="old_password" class="form-control" placeholder="Enter old password" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <input type="password" name="new_password" class="form-control" placeholder="Enter new password" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" name="confirm_password" class="form-control" placeholder="Confirm new password" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">Update Password</button>
            </form>

            {% for message in messages %}
            <p class="text-center text-danger mt-3 fw-bold">{{ message }}</p>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
