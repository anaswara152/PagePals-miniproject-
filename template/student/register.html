{% extends 'common/page2.html' %}
{% load static %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 90vh; background-color: #f3f6f9;">
  <div class="card shadow-lg p-4" style="width: 420px; border-radius: 15px;">
    <h3 class="text-center mb-4 text-primary">Student Registration</h3>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-success text-center py-2">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label fw-semibold">Full Name</label>
        <input type="text" name="name" class="form-control" placeholder="Enter full name" required>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Age</label>
        <input type="number" name="age" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Gender</label>
        <select name="gender" class="form-select" required>
          <option value="" disabled selected>Choose...</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Address</label>
        <textarea name="address" class="form-control" rows="3" placeholder="Enter address" required></textarea>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter username" required>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Profile Photo (optional)</label>
        <input type="file" name="file" class="form-control" accept="image/*">
        <small class="text-muted">If no file is chosen, "no pic" will be stored.</small>
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-primary">Register</button>
      </div>
    </form>
      <div class="text-center mt-3">
      <p> Have an account? <a href="{% url 'login' %}" class="text-decoration-none text-primary">Login here</a></p>
    </div>
  </div>
</div>
{% endblock %}
