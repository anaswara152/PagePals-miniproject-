{% extends 'common/page2.html' %}
{% load static %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh; background-color: #f3f6f9;">
  <div class="card shadow-lg p-4" style="width: 380px; border-radius: 15px;">
    <h3 class="text-center mb-4 text-primary">Login</h3>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-danger text-center py-2">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter username" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
      </div>
      <div class="d-grid">
        <button type="submit" class="btn btn-primary">Login</button>
      </div>
    </form>

    <div class="text-center mt-3">
      <p>Don't have an account? <a href="{% url 'registration' %}" class="text-decoration-none text-primary">Register here</a></p>
      <p>Forgot password? <a href="{% url 'forgot' %}" class="text-decoration-none text-primary">Click here</a></p>
    </div>
  </div>
</div>
{% endblock %}
